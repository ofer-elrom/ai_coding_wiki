site_name: Coding With AI — A Practical Wiki
site_description: Learnings about professionally writing code with AI, extracted from Every's "AI & I" podcast.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - 00 · Synthesis: 00-synthesis-coding-with-ai.md
  - The core operating system:
      - 01 · From Writing Code to Directing Agents: 01-from-writing-code-to-directing-agents.md
      - 02 · Planning & Specs: 02-planning-and-specs.md
      - 03 · Context Engineering: 03-context-engineering.md
      - 04 · Delegation & the Leash: 04-delegation-and-the-leash.md
      - 05 · Verification, Review & Testing: 05-verification-review-and-testing.md
      - 06 · Compounding Engineering: 06-compounding-engineering.md
  - Scaling up:
      - 07 · Parallelism & Agent Fleets: 07-parallelism-and-agent-fleets.md
      - 08 · Tools, Harnesses & Form Factors: 08-tools-harnesses-and-form-factors.md
      - 09 · Choosing & Using Models for Coding: 09-choosing-models-for-coding.md
      - 10 · Agents as Users & Infrastructure: 10-agents-as-users-and-infrastructure.md
  - The bigger picture:
      - 11 · The Changing Role of the Engineer: 11-the-changing-role-of-the-engineer.md
      - 12 · Building Products When Code Is Cheap: 12-building-products-when-code-is-cheap.md
      - 13 · Beginners & Democratization: 13-beginners-and-democratization.md
      - 14 · Pitfalls, Limits & Risks: 14-pitfalls-limits-and-risks.md
