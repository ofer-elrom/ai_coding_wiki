name: Deploy docs
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Silence the Node.js 20 deprecation warning by forcing Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Permissions the modern Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
